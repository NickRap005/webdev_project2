<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The First Obstacle</title>
    <!-- TODO: Import your CSS File here -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="container">
        <h1>The First Obstacle</h1>
        <p>As you venture deeper into the Dark Forest, you encounter a mystical guardian. The guardian blocks your path
            and poses a riddle:</p>
        <blockquote>"I speak without a mouth and hear without ears. I have no body, but I come alive with wind. What am
            I?”</blockquote>
        <form id="firstEventForm" type="get" action="page5.html">
            <label>Your Answer: </label>
            <input id="riddleResponse" type="text" name="response" placeholder="What am I?">
            <input type="submit" id="submitButton" style="background-color: blue; color: white;">
        </form>
    </section>
    <script>
        document.getElementById("riddleResponse").addEventListener("input", function () {
            changeButtonColor("Echo", document.getElementById("riddleResponse"));
        });

        function changeButtonColor(correctAnswer, answerInput) {
            if (correctAnswer === answerInput.value) {
                const button = document.getElementById("submitButton");
                button.style.backgroundColor = "green";
                button.style.color = "white";
            }
            else {
                const button = document.getElementById("submitButton");
                button.style.backgroundColor = "red";
                button.style.color = "white";
            }
        }
    </script>
</body>

</html>
