<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Selection</title>
    <!-- TODO: Import your CSS File here -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="container">
        <form id="characterForm" type="get" action="page3.html">
            <fieldset>
                <legend>Choose Your Character</legend>
                <fieldset>
                    <input type="radio" id="warrior" name="character" value="warrior"> Warrior
                </fieldset>
                <fieldset>
                    <input type="radio" id="mage" name="character" value="mage"> Mage
                </fieldset>
                <fieldset>
                    <input type="radio" id="rogue" name="character" value="rogue"> Rogue
                </fieldset>
                <input type="submit" id="Continue"> 
            </fieldset>
        </form>
    </section>
</body>
</html>
